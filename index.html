<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a8a">
<link rel="manifest" href="manifest.json">
<title>Control de Neveras — Farmanorte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --panel-2:#1c2230;
    --line:#2a3140;
    --txt:#e6edf3;
    --muted:#8b96a5;
    --accent:#1ca6e8;
    --navy:#1e3a8a;
    --ok:#2ea043;
    --warn:#e3a008;
    --danger:#f85149;
    --coca:#f40000;
    --posto:#0a4ea2;
    --farma:#16a34a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
  .mono{font-family:'Space Mono',monospace}

  header{padding:18px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#1e3a8a,#16306e);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:12px}
  .hlogo{height:42px;width:auto;display:block}
  header h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
  header .sub{font-size:11px;color:#b9c7e8;font-weight:500;letter-spacing:.5px;text-transform:uppercase}

  .wrap{max-width:760px;margin:0 auto;padding:16px}

  /* Banner resumen */
  .banner{background:linear-gradient(135deg,#3a1212,#2a1010);border:1px solid #5a2020;border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
  .banner.warn{background:linear-gradient(135deg,#2e2608,#241e06);border-color:#5a4a10}
  .banner.ok{background:linear-gradient(135deg,#0f2417,#0c1d13);border-color:#1d4a30}
  .banner .ico{font-size:22px;flex:none}
  .banner .t{font-size:14px;font-weight:600;line-height:1.3}
  .banner .t b{font-family:'Space Mono',monospace}

  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .kpi .n{font-size:26px;font-weight:800;line-height:1;font-family:'Space Mono',monospace}
  .kpi .l{font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.4px}
  .kpi.bad .n{color:var(--danger)}
  .kpi.warn .n{color:var(--warn)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  input,select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:10px;font-size:15px;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
  .full{margin-bottom:12px}

  .btn{width:100%;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .05s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#062a3d}
  .btn-ghost{background:var(--panel-2);color:var(--txt);border:1px solid var(--line)}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn{padding:11px}
  .btn-cancel{background:transparent;color:var(--muted);border:1px solid var(--line)}

  .search{margin-bottom:12px;position:relative}
  .search input{padding-left:38px}
  .search::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.6}

  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
  .chip{flex:none;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}

  .grouphdr{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin:14px 4px 8px;display:flex;justify-content:space-between}
  .grouphdr .gn{font-family:'Space Mono',monospace}

  .item{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;border-left-width:4px}
  .item .tag{width:46px;height:46px;border-radius:10px;flex:none;display:grid;place-items:center;font-weight:800;font-size:11px;color:#fff;text-align:center;line-height:1.1}
  .item .info{flex:1;min-width:0}
  .item .name{font-weight:700;font-size:15px}
  .item .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .pill.ok{background:rgba(46,160,67,.15);color:#3fb950}
  .pill.warn{background:rgba(227,160,8,.15);color:var(--warn)}
  .pill.bad{background:rgba(248,81,73,.15);color:var(--danger)}
  .qtybox{display:flex;align-items:center;gap:8px;flex:none}
  .qbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--txt);font-size:18px;font-weight:700;cursor:pointer;display:grid;place-items:center;line-height:1}
  .qbtn:active{transform:scale(.92)}
  .qval{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;min-width:24px;text-align:center}
  .iconbtn{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:4px 6px;flex:none}
  .iconbtn:hover{color:var(--txt)}
  .iconbtn.del:hover{color:var(--danger)}

  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:10px;opacity:.5}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  footer{padding:24px 16px;text-align:center;color:var(--muted);font-size:11px}

  .move-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .move-overlay.open{display:flex}
  .move-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:380px}
  .move-box h3{font-size:17px;margin-bottom:4px}
  .move-box .move-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
  .loc-totals{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
  .loc-totals .lt{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px}
  .loc-totals .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .loc-totals .lt .nm{font-size:13px;font-weight:600;flex:1}
  .loc-totals .lt .qt{font-family:'Space Mono',monospace;font-weight:700;font-size:15px}

  datalist{display:none}
  .editing{border-color:var(--accent) !important;box-shadow:0 0 0 1px var(--accent)}

  .photo-area{border:1.5px dashed var(--line);border-radius:10px;padding:18px;text-align:center;color:var(--muted);font-size:14px;cursor:pointer;background:var(--panel-2)}
  .photo-area img{max-width:100%;max-height:180px;border-radius:8px;display:block;margin:0 auto}
  .thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;flex:none;cursor:pointer;border:1px solid var(--line)}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .lightbox.open{display:flex}
  .lightbox img{max-width:100%;max-height:90vh;border-radius:12px}
  .lightbox .close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none}

  @media(max-width:480px){
    .row-3{grid-template-columns:1fr}
    .kpi .n{font-size:22px}
  }
</style>
</head>

<div class="wrap">

  <!-- Banner resumen vencimientos -->
  <div id="banner" class="banner ok" style="display:none"></div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi"><div class="n" id="kTotal">0</div><div class="l">Unidades</div></div>
    <div class="kpi warn"><div class="n" id="kSoon">0</div><div class="l">Por vencer</div></div>
    <div class="kpi bad"><div class="n" id="kExp">0</div><div class="l">Vencidas</div></div>
  </div>

  <!-- Totales por ubicación -->
  <div class="loc-totals" id="locTotals"></div>

  <!-- Registro / edición -->
  <div class="card" id="formCard">
    <h2><span id="formTitle">Registrar producto</span></h2>
    <div class="full">
      <label>Nevera</label>
      <select id="fNevera">
        <option value="Coca-Cola">Nevera Coca-Cola</option>
        <option value="Postobón">Nevera Postobón</option>
        <option value="Farmanorte">Nevera Farmanorte</option>
        <option value="Bodega">Bodega</option>
      </select>
    </div>
    <div class="full">
      <label>Producto</label>
      <input id="fProducto" list="prodList" placeholder="Ej: Coca-Cola 400ml, Manzana Postobón 1.5L">
      <datalist id="prodList"></datalist>
    </div>
    <div class="row-3">
      <div><label>Cantidad</label><input id="fCant" type="number" min="1" value="1" inputmode="numeric"></div>
      <div><label>Lote (opcional)</label><input id="fLote" placeholder="—"></div>
      <div><label>Vencimiento</label><input id="fVence" type="date"></div>
    </div>
    <div class="full">
      <label>Foto del producto (opcional)</label>
      <input id="fFoto" type="file" accept="image/*" capture="environment" onchange="onPhotoPick(event)" style="display:none">
      <div id="photoArea" class="photo-area" onclick="document.getElementById('fFoto').click()">
        <span id="photoHint">📷 Tomar o elegir foto</span>
        <img id="photoPreview" style="display:none">
      </div>
      <button type="button" id="removePhotoBtn" class="btn btn-cancel" onclick="clearPickedPhoto()" style="display:none;margin-top:8px">Quitar foto</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">Agregar a la nevera</button>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none;max-width:120px">Cancelar</button>
    </div>
  </div>

  <!-- Buscador -->
  <div class="search"><input id="searchInput" placeholder="Buscar producto..." oninput="render()"></div>

  <!-- Filtros -->
  <div class="filters" id="filters">
    <div class="chip active" data-f="all">Todas</div>
    <div class="chip" data-f="Coca-Cola">Coca-Cola</div>
    <div class="chip" data-f="Postobón">Postobón</div>
    <div class="chip" data-f="Farmanorte">Farmanorte</div>
    <div class="chip" data-f="Bodega">Bodega</div>
    <div class="chip" data-f="alert">⚠ Por vencer / vencidas</div>
  </div>

  <!-- Orden -->
  <div class="full" style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
    <label style="margin:0;flex:none">Ordenar:</label>
    <select id="sortBy" onchange="render()" style="flex:1">
      <option value="vence">Por vencimiento (más próximo)</option>
      <option value="nombre">Por nombre (A-Z)</option>
      <option value="nevera">Agrupado por nevera</option>
    </select>
  </div>

  <!-- Lista -->
  <div id="list"></div>

  <!-- Acciones -->
  <div class="actions">
    <button class="btn btn-primary" onclick="report()" style="background:var(--navy);color:#fff">📄 Pasar reporte</button>
    <button class="btn btn-ghost" onclick="openSettings()">⚙ Ajustes</button>
  </div>
  <div class="actions">
    <button class="btn btn-ghost" onclick="backup()">⬇ Respaldar</button>
    <button class="btn btn-ghost" onclick="document.getElementById('imp').click()">⬆ Restaurar</button>
  </div>
  <input type="file" id="imp" accept="application/json" style="display:none" onchange="restore(event)">

  <!-- Ajustes -->
  <div class="card" id="settingsCard" style="display:none;margin-top:16px">
    <h2>Ajustes</h2>
    <div class="full">
      <label>Avisar cuando falten estos días para vencer</label>
      <input id="setDias" type="number" min="1" max="120" inputmode="numeric">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveSettings()">Guardar ajustes</button>
      <button class="btn btn-ghost" onclick="clearAll()" style="max-width:140px">🗑 Vaciar todo</button>
    </div>
  </div>

</div>

<div class="move-overlay" id="moveOverlay">
  <div class="move-box">
    <h3 id="moveTitle">Mover a nevera</h3>
    <p class="move-sub" id="moveSub"></p>
    <label>¿A qué nevera?</label>
    <select id="moveTo">
      <option value="Coca-Cola">Nevera Coca-Cola</option>
      <option value="Postobón">Nevera Postobón</option>
      <option value="Farmanorte">Nevera Farmanorte</option>
    </select>
    <label style="margin-top:12px">¿Cuántas unidades pasas?</label>
    <input id="moveQty" type="number" min="1" inputmode="numeric" value="1">
    <label style="margin-top:12px">Vencimiento (opcional)</label>
    <input id="moveVence" type="date">
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-primary" onclick="confirmMove()">Mover</button>
      <button class="btn btn-cancel" onclick="closeMove()" style="max-width:120px">Cancelar</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" alt="Foto del producto">
</div>

<footer>Datos guardados en este dispositivo · <span class="mono" id="ver"></span></footer>

<script>
const KEY='neveras_v1';
const CFG='neveras_cfg_v1';
let data=[];
let cfg={dias:15};
let filter='all';
let editId=null;
let pickedPhoto=null;   // dataURL de la foto recién elegida
let photoCleared=false; // marca si se quitó la foto al editar

/* ---- IndexedDB para fotos ---- */
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('neveras-fotos',1);
    r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('fotos'))d.createObjectStore('fotos');};
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=e=>rej(e);
  });
}
function putPhoto(id,dataURL){
  return new Promise((res,rej)=>{const t=db.transaction('fotos','readwrite');t.objectStore('fotos').put(dataURL,id);t.oncomplete=res;t.onerror=rej;});
}
function getPhoto(id){
  return new Promise(res=>{if(!db)return res(null);const t=db.transaction('fotos','readonly');const rq=t.objectStore('fotos').get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>res(null);});
}
function deletePhoto(id){
  return new Promise(res=>{if(!db)return res();const t=db.transaction('fotos','readwrite');t.objectStore('fotos').delete(id);t.oncomplete=res;t.onerror=res;});
}
function allPhotos(){
  return new Promise(res=>{if(!db)return res({});const out={};const t=db.transaction('fotos','readonly');const st=t.objectStore('fotos');const cur=st.openCursor();cur.onsuccess=e=>{const c=e.target.result;if(c){out[c.key]=c.value;c.continue();}else res(out);};cur.onerror=()=>res(out);});
}

/* comprime imagen a max 900px lado mayor, calidad 0.7 */
function compressImage(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;const max=900;
        if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        res(cv.toDataURL('image/jpeg',0.7));
      };
      img.onerror=rej;img.src=reader.result;
    };
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}

async function onPhotoPick(e){
  const file=e.target.files[0];if(!file)return;
  try{
    pickedPhoto=await compressImage(file);
    photoCleared=false;
    const pv=document.getElementById('photoPreview');
    pv.src=pickedPhoto;pv.style.display='block';
    document.getElementById('photoHint').style.display='none';
    document.getElementById('removePhotoBtn').style.display='block';
  }catch(err){alert('No se pudo procesar la foto.');}
  e.target.value='';
}
function clearPickedPhoto(){
  pickedPhoto=null;photoCleared=true;
  const pv=document.getElementById('photoPreview');
  pv.src='';pv.style.display='none';
  document.getElementById('photoHint').style.display='inline';
  document.getElementById('removePhotoBtn').style.display='none';
}

function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

const NEVERAS={
  'Coca-Cola':{bg:'#f40000',short:'COCA'},
  'Postobón':{bg:'#0a4ea2',short:'POST'},
  'Farmanorte':{bg:'#16a34a',short:'FARMA'},
  'Bodega':{bg:'#7c3aed',short:'BODEGA'}
};

function load(){
  try{ data=JSON.parse(localStorage.getItem(KEY))||[] }catch(e){ data=[] }
  try{ const c=JSON.parse(localStorage.getItem(CFG)); if(c&&c.dias) cfg=c }catch(e){}
}
function save(){ localStorage.setItem(KEY,JSON.stringify(data)) }
function saveCfg(){ localStorage.setItem(CFG,JSON.stringify(cfg)) }

function daysTo(s){
  if(!s) return null;
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  return Math.round((new Date(s+'T00:00:00')-hoy)/86400000);
}
function statusOf(d){
  if(d===null) return {cls:'ok',label:'Sin fecha'};
  if(d<0) return {cls:'bad',label:'Vencida'};
  if(d===0) return {cls:'bad',label:'Vence hoy'};
  if(d<=cfg.dias) return {cls:'warn',label:'Vence en '+d+'d'};
  return {cls:'ok',label:d+' días'};
}

/* ---- Guardar (agregar o editar) ---- */
async function saveProduct(){
  const nevera=document.getElementById('fNevera').value;
  const prod=document.getElementById('fProducto').value.trim();
  const cant=parseInt(document.getElementById('fCant').value)||1;
  const lote=document.getElementById('fLote').value.trim();
  const vence=document.getElementById('fVence').value;
  if(!prod){ alert('Escribe el nombre del producto.'); return; }
  let targetId;
  if(editId){
    const it=data.find(x=>x.id===editId);
    if(it){ it.nevera=nevera; it.prod=prod; it.cant=cant; it.lote=lote; it.vence=vence;
      if(pickedPhoto){await putPhoto(it.id,pickedPhoto);it.foto=true;}
      else if(photoCleared){await deletePhoto(it.id);it.foto=false;}
    }
    targetId=editId; editId=null;
  }else{
    targetId=Date.now();
    const item={id:targetId,nevera,prod,cant,lote,vence,foto:false};
    if(pickedPhoto){await putPhoto(targetId,pickedPhoto);item.foto=true;}
    data.unshift(item);
  }
  save(); resetForm(); render();
}
function resetForm(){
  document.getElementById('fProducto').value='';
  document.getElementById('fCant').value='1';
  document.getElementById('fLote').value='';
  document.getElementById('fVence').value='';
  document.getElementById('formTitle').textContent='Registrar producto';
  document.getElementById('saveBtn').textContent='Agregar a la nevera';
  document.getElementById('cancelBtn').style.display='none';
  document.getElementById('formCard').classList.remove('editing');
  clearPickedPhoto(); photoCleared=false;
  editId=null;
}
async function editItem(id){
  const it=data.find(x=>x.id===id); if(!it) return;
  editId=id;
  document.getElementById('fNevera').value=it.nevera;
  document.getElementById('fProducto').value=it.prod;
  document.getElementById('fCant').value=it.cant;
  document.getElementById('fLote').value=it.lote||'';
  document.getElementById('fVence').value=it.vence||'';
  // cargar foto existente en el preview
  pickedPhoto=null; photoCleared=false;
  const pv=document.getElementById('photoPreview');
  if(it.foto){
    const f=await getPhoto(it.id);
    if(f){pv.src=f;pv.style.display='block';document.getElementById('photoHint').style.display='none';document.getElementById('removePhotoBtn').style.display='block';}
  }else{clearPickedPhoto();}
  document.getElementById('formTitle').textContent='Editar producto';
  document.getElementById('saveBtn').textContent='Guardar cambios';
  document.getElementById('cancelBtn').style.display='block';
  document.getElementById('formCard').classList.add('editing');
  window.scrollTo({top:0,behavior:'smooth'});
}
function cancelEdit(){ resetForm(); }

function changeQty(id,delta){
  const it=data.find(x=>x.id===id); if(!it) return;
  it.cant=Math.max(1,it.cant+delta);
  save(); render();
}
async function del(id){
  const it=data.find(x=>x.id===id);
  if(it && !confirm('¿Eliminar "'+it.prod+'"?')) return;
  await deletePhoto(id);
  data=data.filter(x=>x.id!==id);
  if(editId===id) resetForm();
  save(); render();
}
function setFilter(f){ filter=f; render(); }

/* ---- Mover de bodega a nevera ---- */
let moveId=null;
function openMove(id){
  const it=data.find(x=>x.id===id); if(!it) return;
  moveId=id;
  document.getElementById('moveSub').textContent=it.prod+' · '+it.cant+' en bodega';
  document.getElementById('moveQty').value=Math.min(10,it.cant);
  document.getElementById('moveQty').max=it.cant;
  document.getElementById('moveTo').value='Coca-Cola';
  document.getElementById('moveVence').value='';
  document.getElementById('moveOverlay').classList.add('open');
}
function closeMove(){ moveId=null; document.getElementById('moveOverlay').classList.remove('open'); }
function confirmMove(){
  const it=data.find(x=>x.id===moveId); if(!it){closeMove();return;}
  const dest=document.getElementById('moveTo').value;
  const qty=parseInt(document.getElementById('moveQty').value)||0;
  const vence=document.getElementById('moveVence').value;
  if(qty<1){ alert('Escribe cuántas unidades pasas.'); return; }
  if(qty>it.cant){ alert('No puedes mover más de las '+it.cant+' que hay en bodega.'); return; }

  // ¿ya existe ese producto en la nevera destino? entonces sumar
  const existing=data.find(x=>x.nevera===dest && x.prod===it.prod && (x.vence||'')===(vence||''));
  if(existing){
    existing.cant+=qty;
  }else{
    data.unshift({id:Date.now(),nevera:dest,prod:it.prod,cant:qty,lote:it.lote||'',vence:vence||'',foto:false});
  }
  // restar de bodega; si queda en 0, eliminar el registro de bodega
  it.cant-=qty;
  if(it.cant<=0){ data=data.filter(x=>x.id!==it.id); }

  save(); closeMove(); render();
}

/* ---- Lista visible ---- */
function visible(){
  let arr=[...data];
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(q) arr=arr.filter(x=>x.prod.toLowerCase().includes(q));
  if(filter==='alert') arr=arr.filter(x=>{const d=daysTo(x.vence);return d!==null&&d<=cfg.dias});
  else if(filter!=='all') arr=arr.filter(x=>x.nevera===filter);
  const sort=document.getElementById('sortBy').value;
  if(sort==='nombre') arr.sort((a,b)=>a.prod.localeCompare(b.prod));
  else arr.sort((a,b)=>{const da=daysTo(a.vence),db=daysTo(b.vence);if(da===null)return 1;if(db===null)return -1;return da-db});
  return arr;
}

function itemHTML(x){
  const nv=NEVERAS[x.nevera]||{bg:'#555',short:'?'};
  const d=daysTo(x.vence); const st=statusOf(d);
  const fecha=x.vence?new Date(x.vence+'T00:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'2-digit'}):'—';
  const visual=x.foto
    ? `<img class="thumb" id="thumb-${x.id}" data-pid="${x.id}" alt="foto" style="background:${nv.bg}">`
    : `<div class="tag" style="background:${nv.bg}">${nv.short}</div>`;
  return `<div class="item" style="border-left-color:${nv.bg}">
    ${visual}
    <div class="info">
      <div class="name">${esc(x.prod)}</div>
      <div class="meta">
        <span>📅 ${fecha}</span>
        ${x.lote?`<span>Lote ${esc(x.lote)}</span>`:''}
        <span class="pill ${st.cls}">${st.label}</span>
      </div>
    </div>
    <div class="qtybox">
      <button class="qbtn" onclick="changeQty(${x.id},-1)">−</button>
      <span class="qval">${x.cant}</span>
      <button class="qbtn" onclick="changeQty(${x.id},1)">+</button>
    </div>
    <button class="iconbtn" onclick="editItem(${x.id})">✏️</button>
    ${x.nevera==='Bodega'?`<button class="iconbtn" title="Mover a nevera" onclick="openMove(${x.id})">📦→</button>`:''}
    <button class="iconbtn del" onclick="del(${x.id})">🗑</button>
  </div>`;
}

/* carga las miniaturas desde IndexedDB tras pintar la lista */
async function loadThumbs(){
  const imgs=document.querySelectorAll('img.thumb[data-pid]');
  for(const im of imgs){
    const pid=Number(im.dataset.pid);
    const src=await getPhoto(pid);
    if(src){ im.src=src; im.onclick=()=>openLightbox(src); }
  }
}

function render(){
  // KPIs
  let total=0,soon=0,exp=0;
  data.forEach(x=>{total+=x.cant;const d=daysTo(x.vence);
    if(d!==null&&d<0)exp+=x.cant;else if(d!==null&&d<=cfg.dias)soon+=x.cant;});
  document.getElementById('kTotal').textContent=total;
  document.getElementById('kSoon').textContent=soon;
  document.getElementById('kExp').textContent=exp;

  // Totales por ubicación (solo las que tienen productos)
  const locDiv=document.getElementById('locTotals');
  const order=['Coca-Cola','Postobón','Farmanorte','Bodega'];
  let lhtml='';
  order.forEach(loc=>{
    const items=data.filter(x=>x.nevera===loc);
    if(items.length===0) return;
    const u=items.reduce((s,x)=>s+x.cant,0);
    const nv=NEVERAS[loc];
    lhtml+=`<div class="lt"><span class="dot" style="background:${nv.bg}"></span><span class="nm">${loc==='Bodega'?'Bodega':'Nevera '+loc}</span><span class="qt">${u}</span></div>`;
  });
  locDiv.innerHTML=lhtml;

  // Banner
  const b=document.getElementById('banner');
  const nExp=data.filter(x=>{const d=daysTo(x.vence);return d!==null&&d<0}).length;
  const nSoon=data.filter(x=>{const d=daysTo(x.vence);return d!==null&&d>=0&&d<=cfg.dias}).length;
  if(nExp>0){
    b.style.display='flex';b.className='banner';
    b.innerHTML=`<span class="ico">🔴</span><span class="t"><b>${nExp}</b> producto(s) vencido(s)${nSoon?` y <b>${nSoon}</b> por vencer`:''}. Revísalos.</span>`;
  }else if(nSoon>0){
    b.style.display='flex';b.className='banner warn';
    b.innerHTML=`<span class="ico">🟡</span><span class="t"><b>${nSoon}</b> producto(s) por vencer en ${cfg.dias} días o menos.</span>`;
  }else if(data.length>0){
    b.style.display='flex';b.className='banner ok';
    b.innerHTML=`<span class="ico">🟢</span><span class="t">Todo en regla. Ningún producto próximo a vencer.</span>`;
  }else b.style.display='none';

  // datalist productos frecuentes
  const names=[...new Set(data.map(x=>x.prod))].sort();
  document.getElementById('prodList').innerHTML=names.map(n=>`<option value="${esc(n)}">`).join('');

  // chips
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.f===filter));

  // lista
  const list=document.getElementById('list');
  const arr=visible();
  if(arr.length===0){
    list.innerHTML='<div class="empty"><div class="big">🧊</div>No hay productos aquí.<br>Registra el primero arriba.</div>';
    return;
  }
  const sort=document.getElementById('sortBy').value;
  if(sort==='nevera'){
    let html='';
    ['Coca-Cola','Postobón','Farmanorte','Bodega'].forEach(nv=>{
      const g=arr.filter(x=>x.nevera===nv);
      if(g.length===0) return;
      const sub=g.reduce((s,x)=>s+x.cant,0);
      html+=`<div class="grouphdr"><span>Nevera ${nv}</span><span class="gn">${sub} und</span></div>`;
      html+=g.map(itemHTML).join('');
    });
    list.innerHTML=html;
  }else{
    list.innerHTML=arr.map(itemHTML).join('');
  }
  loadThumbs();
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---- Ajustes ---- */
function openSettings(){
  const c=document.getElementById('settingsCard');
  const show=c.style.display==='none';
  c.style.display=show?'block':'none';
  if(show){document.getElementById('setDias').value=cfg.dias;c.scrollIntoView({behavior:'smooth'});}
}
function saveSettings(){
  const d=parseInt(document.getElementById('setDias').value);
  if(d>=1&&d<=120){cfg.dias=d;saveCfg();render();alert('Ajustes guardados. Avisaré con '+d+' días de anticipación.');}
  else alert('Pon un número entre 1 y 120.');
}

/* ---- Reporte ---- */
function report(){
  if(data.length===0){ alert('No hay datos para reportar.'); return; }
  const fecha=new Date().toLocaleString('es-CO');
  const groups={};
  data.forEach(x=>{(groups[x.nevera]=groups[x.nevera]||[]).push(x)});
  let total=0,soon=0,exp=0;
  data.forEach(x=>{total+=x.cant;const d=daysTo(x.vence);
    if(d!==null&&d<0)exp+=x.cant;else if(d!==null&&d<=cfg.dias)soon+=x.cant;});
  let rows='';
  Object.keys(groups).forEach(nv=>{
    const arr=groups[nv].sort((a,b)=>{const da=daysTo(a.vence),db=daysTo(b.vence);if(da===null)return 1;if(db===null)return -1;return da-db});
    rows+=`<tr class="grp"><td colspan="5">Nevera ${nv}</td></tr>`;
    arr.forEach(x=>{const d=daysTo(x.vence);const st=statusOf(d);
      const f=x.vence?new Date(x.vence+'T00:00:00').toLocaleDateString('es-CO'):'—';
      rows+=`<tr><td>${esc(x.prod)}</td><td style="text-align:center">${x.cant}</td><td>${x.lote?esc(x.lote):'—'}</td><td>${f}</td><td class="s-${st.cls}">${st.label}</td></tr>`;});
  });
  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Reporte de Neveras</title><style>
  body{font-family:Arial,sans-serif;color:#111;padding:28px;max-width:800px;margin:auto}
  h1{font-size:20px;margin:0}.sub{color:#666;font-size:13px;margin:4px 0 18px}
  .kpis{display:flex;gap:12px;margin-bottom:20px}.k{flex:1;border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center}
  .k b{font-size:22px;display:block}.k span{font-size:11px;color:#666}
  table{width:100%;border-collapse:collapse;font-size:13px}th{background:#1e3a8a;color:#fff;text-align:left;padding:8px}
  td{padding:7px 8px;border-bottom:1px solid #eee}.grp td{background:#eef2fb;font-weight:bold;text-transform:uppercase;font-size:12px;letter-spacing:.5px;color:#1e3a8a}
  .s-bad{color:#c00;font-weight:bold}.s-warn{color:#b07000;font-weight:bold}.s-ok{color:#155}
  @media print{.noprint{display:none}}.noprint{margin-bottom:18px}
  button{padding:9px 16px;font-size:14px;border:none;border-radius:6px;background:#1ca6e8;color:#fff;cursor:pointer}</style></head><body>
  <div class="noprint"><button onclick="window.print()">🖨 Imprimir / Guardar PDF</button></div>
  <h1>Reporte de Inventario — Neveras</h1><div class="sub">Farmanorte · Generado: ${fecha}</div>
  <div class="kpis"><div class="k"><b>${total}</b><span>UNIDADES</span></div>
  <div class="k"><b style="color:#b07000">${soon}</b><span>POR VENCER (≤${cfg.dias}d)</span></div>
  <div class="k"><b style="color:#c00">${exp}</b><span>VENCIDAS</span></div></div>
  <table><thead><tr><th>Producto</th><th>Cant.</th><th>Lote</th><th>Vence</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table>
  <p style="margin-top:20px;font-size:11px;color:#999">Control de Neveras · ${fecha}</p></body></html>`;
  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else{const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='reporte-neveras.html';a.click();}
}

/* ---- Backup ---- */
async function backup(){
  const fotos=await allPhotos();
  const payload={data,cfg,fotos};
  const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='neveras-respaldo-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function restore(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async()=>{try{
    const p=JSON.parse(r.result);
    const arr=Array.isArray(p)?p:p.data;
    if(!Array.isArray(arr))throw 0;
    data=arr; if(p.cfg&&p.cfg.dias)cfg=p.cfg;
    if(p.fotos){for(const k in p.fotos){await putPhoto(Number(k),p.fotos[k]);}}
    save();saveCfg();render();
    alert('Datos restaurados ('+arr.length+' registros).');
  }catch(err){alert('Archivo inválido.')}};
  r.readAsText(file);e.target.value='';
}
async function clearAll(){
  if(confirm('¿Vaciar TODO el inventario? No se puede deshacer.')){
    for(const x of data){await deletePhoto(x.id);}
    data=[];save();render();
  }
}

document.getElementById('filters').addEventListener('click',e=>{if(e.target.classList.contains('chip'))setFilter(e.target.dataset.f)});
document.getElementById('fProducto').addEventListener('keydown',e=>{if(e.key==='Enter')saveProduct()});
document.getElementById('ver').textContent='v5.0';

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

openDB().then(()=>{load();render();}).catch(()=>{load();render();});
</script>
</body>
</html>
